<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a227f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121320",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Pengaturan Printer</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden border-x border-slate-200 dark:border-slate-800 shadow-sm">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 ml-2">Pengaturan Printer</h2>
</div>
<!-- Status Section -->
<div class="p-4 @container">
<div class="flex flex-1 flex-col items-start justify-between gap-4 rounded-lg border border-red-200 bg-red-50 dark:bg-red-900/10 dark:border-red-900/30 p-5 @[480px]:flex-row @[480px]:items-center">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="size-2 rounded-full bg-red-600"></span>
<p class="text-red-700 dark:text-red-400 text-base font-bold leading-tight">Status: Terputus</p>
</div>
<p class="text-red-600/80 dark:text-red-400/80 text-sm font-normal leading-normal">Printer belum terhubung ke aplikasi</p>
</div>
</div>
</div>
<!-- Main Action: Search -->
<div class="flex px-4 py-3">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-primary text-white gap-3 transition-opacity hover:opacity-90 active:scale-[0.98]">
<span class="material-symbols-outlined">search</span>
<span class="truncate text-base font-bold leading-normal tracking-wide">CARI PERANGKAT BARU</span>
</button>
</div>
<!-- List Section -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider opacity-60">Perangkat Ditemukan</h3>
</div>
<div class="flex flex-col divide-y divide-slate-100 dark:divide-slate-800">
<!-- Device 1 -->
<div class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[80px] py-3 justify-between">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined">print</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal line-clamp-1">RPP02N (Printer Termal)</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Bluetooth • 58mm</p>
</div>
</div>
<div class="shrink-0">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary/10 text-primary text-sm font-bold leading-normal hover:bg-primary/20 transition-colors">
                        Sambungkan
                    </button>
</div>
</div>
<!-- Device 2 -->
<div class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[80px] py-3 justify-between">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined">print</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal line-clamp-1">BluePrinter-58</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Bluetooth • Active</p>
</div>
</div>
<div class="shrink-0">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary/10 text-primary text-sm font-bold leading-normal hover:bg-primary/20 transition-colors">
                        Sambungkan
                    </button>
</div>
</div>
<!-- Device 3 -->
<div class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[80px] py-3 justify-between">
<div class="flex items-center gap-4">
<div class="text-slate-400 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 shrink-0 size-12">
<span class="material-symbols-outlined">question_mark</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal line-clamp-1">Unknown Device (ABC:123)</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal leading-normal">Mac Address • Hidden</p>
</div>
</div>
<div class="shrink-0">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary/10 text-primary text-sm font-bold leading-normal hover:bg-primary/20 transition-colors">
                        Sambungkan
                    </button>
</div>
</div>
</div>
<div class="mt-auto p-4 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark">
<!-- Secondary Action: Test Print -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 border-2 border-primary text-primary bg-transparent gap-2 text-sm font-bold leading-normal transition-colors hover:bg-primary/5 active:scale-[0.98]">
<span class="material-symbols-outlined text-xl">description</span>
<span class="truncate">TEST PRINT HALAMAN COBA</span>
</button>
<p class="text-center text-[10px] text-slate-400 mt-3 uppercase tracking-tighter">Versi Aplikasi 2.4.0 (POS Mobile)</p>
</div>
</div>
</body></html>
