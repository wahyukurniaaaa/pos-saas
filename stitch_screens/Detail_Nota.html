<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a227f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121320",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .dashed-separator {
            background-image: linear-gradient(to right, #cbd5e1 50%, transparent 50%);
            background-size: 8px 1px;
            background-repeat: repeat-x;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
<!-- Header -->
<div class="flex items-center p-4 border-b border-slate-100">
<button class="text-slate-900 flex size-10 shrink-0 items-center justify-center hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Detail Nota</h2>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-6">
<!-- Metadata Section -->
<div class="space-y-3">
<div class="flex justify-between gap-x-6">
<p class="text-slate-500 text-sm font-normal">Receipt ID</p>
<p class="text-slate-900 text-sm font-semibold">#POS-99283</p>
</div>
<div class="flex justify-between gap-x-6">
<p class="text-slate-500 text-sm font-normal">Timestamp</p>
<p class="text-slate-900 text-sm font-normal">24 Oct 2023, 14:30</p>
</div>
<div class="flex justify-between gap-x-6">
<p class="text-slate-500 text-sm font-normal">Cashier Name</p>
<p class="text-slate-900 text-sm font-normal">Sarah Jenkins</p>
</div>
</div>
<!-- Dashed Line -->
<div class="h-px dashed-separator w-full"></div>
<!-- Items List -->
<div>
<h3 class="text-slate-900 text-sm font-bold uppercase tracking-wider mb-4">Items</h3>
<div class="space-y-4">
<!-- Item 1 -->
<div class="flex justify-between items-start">
<div class="flex flex-col">
<p class="text-slate-900 text-base font-medium">Iced Caramel Macchiato</p>
<p class="text-slate-500 text-sm">1 x Rp 45.000</p>
</div>
<p class="text-slate-900 text-base font-semibold">Rp 45.000</p>
</div>
<!-- Item 2 -->
<div class="flex justify-between items-start">
<div class="flex flex-col">
<p class="text-slate-900 text-base font-medium">Chocolate Croissant</p>
<p class="text-slate-500 text-sm">2 x Rp 30.000</p>
</div>
<p class="text-slate-900 text-base font-semibold">Rp 60.000</p>
</div>
</div>
</div>
<!-- Dashed Line -->
<div class="h-px dashed-separator w-full"></div>
<!-- Calculation Section -->
<div class="space-y-3 bg-slate-50 p-4 rounded-xl">
<div class="flex justify-between items-center">
<p class="text-slate-600 text-base font-medium">Total</p>
<p class="text-primary text-xl font-bold">Rp 105.000</p>
</div>
<div class="flex justify-between items-center">
<p class="text-slate-500 text-sm">Paid (Cash)</p>
<p class="text-slate-900 text-sm font-medium">Rp 110.000</p>
</div>
<div class="flex justify-between items-center pt-2 border-t border-slate-200">
<p class="text-slate-500 text-sm font-bold">Change</p>
<p class="text-green-600 text-base font-bold">Rp 5.000</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="p-4 bg-white border-t border-slate-100 flex flex-col gap-3">
<button class="w-full flex items-center justify-center gap-2 bg-primary/10 text-primary font-bold py-3 px-4 rounded-xl hover:bg-primary/20 transition-all border border-primary/20">
<span class="material-symbols-outlined text-[20px]">print</span>
                CETAK ULANG STRUK
            </button>
<button class="w-full flex items-center justify-center gap-2 bg-white text-rose-600 font-bold py-3 px-4 rounded-xl hover:bg-rose-50 transition-all border border-rose-200">
<span class="material-symbols-outlined text-[20px]">cancel</span>
                BATALKAN TRANSAKSI (VOID)
            </button>
</div>
</div>
</body></html>
