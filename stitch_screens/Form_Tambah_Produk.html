<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1a227f",
              "background-light": "#f6f6f8",
              "background-dark": "#121320",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Tambah Produk Baru</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden pb-24">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-primary/10 justify-between">
<div class="flex items-center gap-4">
<button class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Tambah Produk Baru</h1>
</div>
<div class="flex items-center">
<button class="flex items-center justify-center rounded-full size-10 text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-2xl">check</span>
</button>
</div>
</header>
<main class="flex flex-col gap-1">
<!-- Image Upload Section -->
<div class="p-4">
<div class="flex flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-primary/20 bg-primary/5 px-6 py-10 transition-all hover:border-primary/40 active:scale-[0.98]">
<div class="flex size-14 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">photo_camera</span>
</div>
<div class="flex flex-col items-center gap-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold text-center">Upload Gambar / Ambil Foto</p>
<p class="text-slate-500 dark:text-slate-400 text-xs text-center">Format JPG, PNG atau JPEG (Maks. 5MB)</p>
</div>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-10 px-5 bg-primary text-white text-sm font-semibold shadow-sm active:opacity-90">
                        Pilih File
                    </button>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col px-4 gap-5">
<!-- Nama Produk -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">Nama Produk*</label>
<input class="form-input w-full rounded-lg text-slate-900 border-primary/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary h-14 px-4 text-base font-normal" placeholder="Masukkan nama produk" type="text" value="Indomie Goreng Spesial"/>
</div>
<!-- Kategori -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">Kategori*</label>
<div class="relative">
<select class="form-select w-full rounded-lg text-slate-900 border-primary/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary h-14 px-4 text-base font-normal appearance-none">
<option value="makanan">Makanan Instan</option>
<option value="minuman">Minuman</option>
<option value="snack">Camilan</option>
</select>
</div>
</div>
<!-- Pricing Row -->
<div class="flex gap-4">
<div class="flex flex-col flex-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">Harga Beli</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">Rp</span>
<input class="form-input w-full rounded-lg text-slate-900 border-primary/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary h-14 pl-11 pr-4 text-base font-normal" placeholder="0" type="text" value="2.500"/>
</div>
</div>
<div class="flex flex-col flex-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">Harga Jual*</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">Rp</span>
<input class="form-input w-full rounded-lg text-slate-900 border-primary/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary h-14 pl-11 pr-4 text-base font-normal" placeholder="0" type="text" value="3.500"/>
</div>
</div>
</div>
<!-- Stock -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">Stok Awal / Opsional</label>
<input class="form-input w-full rounded-lg text-slate-900 border-primary/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary h-14 px-4 text-base font-normal" placeholder="Contoh: 10" type="number" value="24"/>
</div>
<!-- SKU / Barcode -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">SKU / Barcode</label>
<div class="relative flex items-center">
<input class="form-input w-full rounded-lg text-slate-900 border-primary/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary h-14 pl-4 pr-14 text-base font-normal" placeholder="Masukkan atau scan barcode" type="text" value="899123456789"/>
<button class="absolute right-2 flex size-10 items-center justify-center rounded-lg bg-primary/10 text-primary active:bg-primary/20">
<span class="material-symbols-outlined">barcode_scanner</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Primary Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 backdrop-blur-md border-t border-primary/5">
<button class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary h-14 text-white text-base font-bold shadow-lg shadow-primary/30 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">save</span>
<span>SIMPAN PRODUK</span>
</button>
</div>
</div>
</body></html>
