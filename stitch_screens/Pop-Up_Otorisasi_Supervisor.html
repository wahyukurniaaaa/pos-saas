<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1a227f",
              "background-light": "#f6f6f8",
              "background-dark": "#121320",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Otorisasi Supervisor</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-xl shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-800">
<!-- BottomSheetHandle Style Top Decorator -->
<div class="flex flex-col items-center pt-3 pb-1">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<!-- Content Area -->
<div class="px-6 py-6 text-center">
<!-- Shield Icon -->
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 mb-6">
<span class="material-symbols-outlined text-primary text-4xl">
                        shield_person
                    </span>
</div>
<!-- Title -->
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight mb-2 tracking-tight">
                    OTORISASI DIBUTUHKAN
                </h2>
<!-- Description -->
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-8">
                    Tindakan Void (Batal) membutuhkan izin Supervisor / Owner. Silakan masukkan kode PIN otorisasi Anda.
                </p>
<!-- PIN Input Section -->
<div class="flex flex-col items-center gap-6 mb-8">
<div class="flex justify-center gap-3">
<!-- Six digit PIN Inputs -->
<input class="w-12 h-14 text-center text-2xl font-bold border-0 border-b-2 border-slate-200 dark:border-slate-700 focus:ring-0 focus:border-primary bg-transparent text-slate-900 dark:text-slate-100" maxlength="1" placeholder="•" type="password"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-0 border-b-2 border-slate-200 dark:border-slate-700 focus:ring-0 focus:border-primary bg-transparent text-slate-900 dark:text-slate-100" maxlength="1" placeholder="•" type="password"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-0 border-b-2 border-slate-200 dark:border-slate-700 focus:ring-0 focus:border-primary bg-transparent text-slate-900 dark:text-slate-100" maxlength="1" placeholder="•" type="password"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-0 border-b-2 border-slate-200 dark:border-slate-700 focus:ring-0 focus:border-primary bg-transparent text-slate-900 dark:text-slate-100" maxlength="1" placeholder="•" type="password"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-0 border-b-2 border-slate-200 dark:border-slate-700 focus:ring-0 focus:border-primary bg-transparent text-slate-900 dark:text-slate-100" maxlength="1" placeholder="•" type="password"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-0 border-b-2 border-slate-200 dark:border-slate-700 focus:ring-0 focus:border-primary bg-transparent text-slate-900 dark:text-slate-100" maxlength="1" placeholder="•" type="password"/>
</div>
<!-- Helper Text -->
<span class="text-primary text-xs font-semibold cursor-pointer hover:underline">
                        Lupa PIN Otorisasi?
                    </span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-3 p-6 pt-0">
<button class="flex-1 px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    BATAL
                </button>
<button class="flex-1 px-4 py-3 rounded-lg bg-primary text-white font-semibold text-sm shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
                    KONFIRMASI
                </button>
</div>
<!-- Footer Graphic (Abstract Gradient) -->
<div class="h-1 w-full bg-gradient-to-r from-primary/20 via-primary to-primary/20"></div>
</div>
</div>
<!-- Background Content (Simulated Dashboard) -->
<div class="w-full max-w-5xl mx-auto opacity-20 pointer-events-none select-none">
<div class="grid grid-cols-12 gap-6">
<div class="col-span-3 space-y-4">
<div class="h-10 bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-64 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
<div class="col-span-9 space-y-4">
<div class="flex justify-between">
<div class="h-10 w-48 bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-10 w-32 bg-slate-200 dark:bg-slate-800 rounded"></div>
</div>
<div class="h-96 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
</div>
</div>
</body></html>
