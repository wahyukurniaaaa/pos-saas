name: Build & Release APK Lumio

on:
  push:
    branches: ["main", "master"]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Catatan rilis (opsional)"
        required: false
        default: "Build otomatis dari CI"

jobs:
  build:
    name: Build APK Flutter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true

      - name: Create .env file
        working-directory: mobile
        run: |
          printf 'BASE_URL=%s\n' '${{ secrets.MOBILE_BASE_URL }}' > .env
          printf 'APP_CLIENT_KEY=%s\n' '${{ secrets.MOBILE_APP_CLIENT_KEY }}' >> .env
          printf 'SUPABASE_URL=%s\n' '${{ secrets.MOBILE_SUPABASE_URL }}' >> .env
          printf 'SUPABASE_ANON_KEY=%s\n' '${{ secrets.MOBILE_SUPABASE_ANON_KEY }}' >> .env
          printf 'GOOGLE_WEB_CLIENT_ID=%s\n' '${{ secrets.MOBILE_GOOGLE_WEB_CLIENT_ID }}' >> .env

      - name: Restore google-services.json
        working-directory: mobile/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        working-directory: mobile/android/app
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
            printf 'storePassword=%s\n' "$KEYSTORE_STORE_PASSWORD" > ../key.properties
            printf 'keyPassword=%s\n' "$KEYSTORE_KEY_PASSWORD" >> ../key.properties
            printf 'keyAlias=%s\n' "$KEYSTORE_KEY_ALIAS" >> ../key.properties
            printf 'storeFile=%s\n' "release.keystore" >> ../key.properties
          fi

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Extract app version
        id: version
        working-directory: mobile
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r')
          BUILD_NAME=$(echo "$VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VERSION" | cut -d'+' -f2)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          echo "version=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "apk_name=lumio-v${BUILD_NAME}-${BUILD_NUMBER}-${DATE}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv mobile/build/app/outputs/flutter-apk/app-release.apk \
             "mobile/build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumio-apk-${{ steps.version.outputs.version }}
          path: mobile/build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 7

      - name: Push APK to lumio-apk repository
        id: push_apk
        env:
          APK_REPO_TOKEN: ${{ secrets.APK_REPO_TOKEN }}
          APK_NAME: ${{ steps.version.outputs.apk_name }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'Build otomatis dari CI' }}
          GH_EVENT: ${{ github.event_name }}
          GH_BRANCH: ${{ github.ref_name }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M UTC')
          VERSION_FOLDER="v${APP_VERSION}"
          RELEASE_NOTES_SAFE=$(echo "$RELEASE_NOTES" | tr '\n' ' ' | sed 's/  */ /g' | sed 's/^ //;s/ $//') 

          git clone "https://x-access-token:${APK_REPO_TOKEN}@github.com/wahyukurniaaaa/lumio-apk.git" /tmp/lumio-apk
          mkdir -p "/tmp/lumio-apk/releases/${VERSION_FOLDER}"

          # APK TIDAK disimpan di git repo — hanya di GitHub Releases (step berikutnya)
          # Git repo hanya menyimpan metadata: latest.json, release-notes.md, RELEASES.md

          {
            echo "# Release Notes — Lumio v${APP_VERSION}"
            echo ""
            echo "**Build:** ${BUILD_NUMBER}"
            echo "**Commit:** ${SHORT_SHA}"
            echo "**Tanggal:** ${BUILD_DATE}"
            echo ""
            echo "## Perubahan"
            echo ""
            echo "${RELEASE_NOTES}"
          } > "/tmp/lumio-apk/releases/${VERSION_FOLDER}/release-notes.md"

          DOWNLOAD_URL="https://github.com/wahyukurniaaaa/lumio-apk/releases/latest/download/lumio.apk"
          jq -n \
            --arg latest_version "$APP_VERSION" \
            --arg download_url "$DOWNLOAD_URL" \
            --arg release_notes "$RELEASE_NOTES" \
            --arg minimum_version "1.0.0" \
            --arg build_number "$BUILD_NUMBER" \
            --arg released_at "$BUILD_DATE" \
            --arg commit "$SHORT_SHA" \
            '{
              latest_version: $latest_version,
              download_url: $download_url,
              release_notes: $release_notes,
              force_update: false,
              minimum_version: $minimum_version,
              build_number: ($build_number | tonumber),
              released_at: $released_at,
              commit: $commit
            }' > /tmp/lumio-apk/releases/latest.json

          cd /tmp/lumio-apk

          HISTORY=""
          if [ -f RELEASES.md ]; then
            HISTORY=$(grep '^| \[v' RELEASES.md | head -9 || true)
          fi

          {
            echo "# Lumio APK Releases"
            echo ""
            echo "## Latest: v${APP_VERSION}"
            echo ""
            echo "Download APK terbaru: [lumio.apk](https://github.com/wahyukurniaaaa/lumio-apk/releases/latest/download/lumio.apk)"
            echo ""
            echo "---"
            echo ""
            echo "## Release History"
            echo ""
            echo "| Versi | Build | Commit | Tanggal | Download |"
            echo "|-------|-------|--------|---------|----------|"
            echo "| [v${APP_VERSION}](./releases/${VERSION_FOLDER}/release-notes.md) | ${BUILD_NUMBER} | ${SHORT_SHA} | ${BUILD_DATE} | [Download](https://github.com/wahyukurniaaaa/lumio-apk/releases/tag/v${APP_VERSION}) |"
            if [ -n "$HISTORY" ]; then
              echo "$HISTORY"
            fi
            echo ""
            echo "> Build lebih lama tersedia di history commit repo ini."
          } > RELEASES.md

          git config user.email "ci@lumio.app"
          git config user.name "Lumio CI"
          git add .
          git commit -m "release: Lumio v${APP_VERSION}+${BUILD_NUMBER} (${SHORT_SHA})" \
                     -m "" \
                     -m "- latest.json: diperbarui ke v${APP_VERSION}" \
                     -m "- Trigger: ${GH_EVENT}" \
                     -m "- Branch: ${GH_BRANCH}" \
                     -m "- Notes: ${RELEASE_NOTES_SAFE}"

          for attempt in 1 2 3; do
            if git push origin main; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              git pull --rebase origin main
            else
              exit 1
            fi
          done

      - name: Create GitHub Release on lumio-apk
        env:
          GH_TOKEN: ${{ secrets.APK_REPO_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          APK_NAME: ${{ steps.version.outputs.apk_name }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'Build otomatis dari CI' }}
        run: |
          TAG="v${APP_VERSION}"
          APK_SOURCE="mobile/build/app/outputs/flutter-apk/${APK_NAME}"
          APK_STABLE="mobile/build/app/outputs/flutter-apk/lumio.apk"
          REPO="wahyukurniaaaa/lumio-apk"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          cp "$APK_SOURCE" "$APK_STABLE"

          NOTES_FILE=$(mktemp)
          printf '## Lumio v%s\n\n**Build:** %s\n**Commit:** %s\n\n## Perubahan\n\n%s\n\n---\n> Download APK: klik **lumio.apk** di bawah\n' \
            "$APP_VERSION" "$BUILD_NUMBER" "$SHORT_SHA" "$RELEASE_NOTES" > "$NOTES_FILE"

          if gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1; then
            gh release delete-asset "$TAG" "lumio.apk" --repo "$REPO" 2>/dev/null || true
            gh release upload "$TAG" "$APK_STABLE" --repo "$REPO"
            gh release edit "$TAG" --repo "$REPO" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "Lumio v${APP_VERSION}" \
              --notes-file "$NOTES_FILE" \
              --latest \
              "$APK_STABLE"
          fi

          rm -f "$NOTES_FILE"
          echo "Release: https://github.com/${REPO}/releases/tag/${TAG}"
          echo "Download: https://github.com/${REPO}/releases/latest/download/lumio.apk"
