name: Build & Release APK Lumio

on:
  push:
    branches: ["main", "master"]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Catatan rilis (opsional)"
        required: false
        default: "Build otomatis dari CI"

jobs:
  build:
    name: Build APK Flutter
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source repository
        uses: actions/checkout@v4

      # ── 2. Java (dibutuhkan Gradle) ───────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 3. Flutter ────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true

      # ── 4. Environment variables (.env) ───────────────────────────────────────
      # Tidak pakai heredoc agar tidak ada leading whitespace dari indentasi YAML
      - name: Create .env file
        working-directory: mobile
        run: |
          printf 'BASE_URL=%s\n' '${{ secrets.MOBILE_BASE_URL }}' > .env
          printf 'APP_CLIENT_KEY=%s\n' '${{ secrets.MOBILE_APP_CLIENT_KEY }}' >> .env
          printf 'SUPABASE_URL=%s\n' '${{ secrets.MOBILE_SUPABASE_URL }}' >> .env
          printf 'SUPABASE_ANON_KEY=%s\n' '${{ secrets.MOBILE_SUPABASE_ANON_KEY }}' >> .env
          printf 'GOOGLE_WEB_CLIENT_ID=%s\n' '${{ secrets.MOBILE_GOOGLE_WEB_CLIENT_ID }}' >> .env

      # ── 5. Firebase google-services.json ──────────────────────────────────────
      - name: Restore google-services.json
        working-directory: mobile/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      # ── 6. Release keystore ───────────────────────────────────────────────────
      # Cek via env var karena secrets tidak bisa diakses langsung di if: condition
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        working-directory: mobile/android
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Release keystore ditemukan, menggunakan release signing..."
            echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            printf 'storePassword=%s\n' "$KEYSTORE_STORE_PASSWORD" > key.properties
            printf 'keyPassword=%s\n' "$KEYSTORE_KEY_PASSWORD" >> key.properties
            printf 'keyAlias=%s\n' "$KEYSTORE_KEY_ALIAS" >> key.properties
            printf 'storeFile=%s\n' "app/release.keystore" >> key.properties
          else
            echo "KEYSTORE_BASE64 tidak di-set, menggunakan debug signing..."
          fi

      # ── 7. Flutter dependencies ───────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # ── 8. Drift codegen ──────────────────────────────────────────────────────
      - name: Run Drift codegen
        working-directory: mobile
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ── 9. Build APK ──────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      # ── 10. Baca versi dari pubspec.yaml ──────────────────────────────────────
      - name: Extract app version
        id: version
        working-directory: mobile
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          BUILD_NAME=$(echo "$VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VERSION" | cut -d'+' -f2)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          echo "version=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "apk_name=lumio-v${BUILD_NAME}+${BUILD_NUMBER}-${DATE}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

      # ── 11. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv mobile/build/app/outputs/flutter-apk/app-release.apk \
             "mobile/build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"

      # ── 12. Upload APK sebagai artifact (untuk debug / download manual) ───────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumio-apk-${{ steps.version.outputs.version }}
          path: mobile/build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 7

      # ── 13. Push APK ke repo lumio-apk ────────────────────────────────────────
      - name: Push APK to lumio-apk repository
        env:
          APK_REPO_TOKEN: ${{ secrets.APK_REPO_TOKEN }}
          APK_NAME: ${{ steps.version.outputs.apk_name }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'Build otomatis dari CI' }}
          GH_EVENT: ${{ github.event_name }}
          GH_BRANCH: ${{ github.ref_name }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M UTC')
          VERSION_FOLDER="v${APP_VERSION}"
          APK_SIMPLE_NAME="lumio-v${APP_VERSION}.apk"

          # Clone target repo
          git clone "https://x-access-token:${APK_REPO_TOKEN}@github.com/wahyukurniaaaa/lumio-apk.git" /tmp/lumio-apk

          # Buat folder releases/v{version}/
          mkdir -p "/tmp/lumio-apk/releases/${VERSION_FOLDER}"

          # Copy APK ke folder versi (nama sederhana untuk download_url yang stabil)
          cp "mobile/build/app/outputs/flutter-apk/${APK_NAME}" \
             "/tmp/lumio-apk/releases/${VERSION_FOLDER}/${APK_SIMPLE_NAME}"

          # Tulis release-notes.md di folder versi
          {
            echo "# Release Notes — Lumio v${APP_VERSION}"
            echo ""
            echo "**Build:** ${BUILD_NUMBER}"
            echo "**Commit:** ${SHORT_SHA}"
            echo "**Tanggal:** ${BUILD_DATE}"
            echo ""
            echo "## Perubahan"
            echo ""
            echo "${RELEASE_NOTES}"
          } > "/tmp/lumio-apk/releases/${VERSION_FOLDER}/release-notes.md"

          # Update latest.json — dibaca oleh app untuk cek update otomatis
          # Gunakan python3 untuk JSON encoding yang aman (handle karakter ", \n, dll)
          DOWNLOAD_URL="https://github.com/wahyukurniaaaa/lumio-apk/raw/main/releases/${VERSION_FOLDER}/${APK_SIMPLE_NAME}"
          export DOWNLOAD_URL BUILD_DATE SHORT_SHA
          python3 -c "
import json, os
data = {
    'latest_version': os.environ['APP_VERSION'],
    'download_url': os.environ['DOWNLOAD_URL'],
    'release_notes': os.environ['RELEASE_NOTES'],
    'force_update': False,
    'minimum_version': '1.0.0',
    'build_number': int(os.environ['BUILD_NUMBER']),
    'released_at': os.environ['BUILD_DATE'],
    'commit': os.environ['SHORT_SHA'],
}
print(json.dumps(data, ensure_ascii=False, indent=2))
" > /tmp/lumio-apk/releases/latest.json

          # Update RELEASES.md di root
          cd /tmp/lumio-apk

          HISTORY=""
          if [ -f RELEASES.md ]; then
            HISTORY=$(grep '^| \[v' RELEASES.md | head -9 || true)
          fi

          {
            echo "# Lumio APK Releases"
            echo ""
            echo "## Latest: v${APP_VERSION}"
            echo ""
            echo "Download APK terbaru: [lumio-v${APP_VERSION}.apk](./releases/${VERSION_FOLDER}/${APK_SIMPLE_NAME})"
            echo ""
            echo "---"
            echo ""
            echo "## Release History"
            echo ""
            echo "| Versi | Build | Commit | Tanggal | Download |"
            echo "|-------|-------|--------|---------|----------|"
            echo "| [v${APP_VERSION}](./releases/${VERSION_FOLDER}/release-notes.md) | ${BUILD_NUMBER} | ${SHORT_SHA} | ${BUILD_DATE} | [APK](./releases/${VERSION_FOLDER}/${APK_SIMPLE_NAME}) |"
            if [ -n "$HISTORY" ]; then
              echo "$HISTORY"
            fi
            echo ""
            echo "> Build lebih lama tersedia di history commit repo ini."
          } > RELEASES.md

          # Git config
          git config user.email "ci@lumio.app"
          git config user.name "Lumio CI"

          # Commit dan push
          git add .
          git commit -m "release: Lumio v${APP_VERSION}+${BUILD_NUMBER} (${SHORT_SHA})

          - APK: releases/${VERSION_FOLDER}/${APK_SIMPLE_NAME}
          - latest.json: diperbarui ke v${APP_VERSION}
          - Trigger: ${GH_EVENT}
          - Branch: ${GH_BRANCH}
          - Notes: ${RELEASE_NOTES}"

          git push origin main
